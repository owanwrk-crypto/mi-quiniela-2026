<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela FIFA 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>🏆 MUNDIAL FIFA 2026</h1>
        <p id="user-display">Bienvenido a la Quiniela</p>
    </header>

    <div id="login-section" class="login-page-wrapper">
        
        <div class="login-card">
            <div class="trophy-icon">🏆</div>
            <h2>MUNDIAL 2026</h2>
            <p>Ingresa para participar</p>
            
            <div class="input-group">
                <label>USUARIO</label>
                <input type="text" id="login-name" placeholder="Ej: oswaldo">
            </div>
            
            <div class="input-group">
                <label>PIN DE ACCESO</label>
                <input type="password" id="login-pin" placeholder="****">
            </div>
            
            <button onclick="handleLogin()" class="btn-login">INICIAR SESIÓN</button>
            <div class="login-footer">Solo personal autorizado</div>
        </div>

        <div class="sidebar-preview">
            <div id="next-matches-preview" class="preview-container">
                <p class="preview-title">📡 PRÓXIMOS ENCUENTROS</p>
                <div id="preview-list">Cargando calendario...</div>
            </div>
        </div>
    </div>

    <div id="main-section" class="container" style="display:none">
        <nav class="tabs">
            <button class="tab-btn active" onclick="showTab('Grupos')">Grupos</button>
            <button class="tab-btn" onclick="showTab('Dieciseisavos')">1/16
