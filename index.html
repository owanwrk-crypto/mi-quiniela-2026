<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiniela Mundial 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>

<h1>MUNDIAL 2026</h1>
<p class="subtitle">Sistema de Pronósticos</p>

</header>


<!-- LOGIN -->

<div id="login-section">

<div class="login-page-wrapper">

<div class="login-card">

<h2>ACCESO</h2>

<div class="input-group">
<label for="login-name">Usuario</label>
<input id="login-name" type="text" autocomplete="off">
</div>

<div class="input-group">
<label for="login-pin">PIN</label>
<input id="login-pin" type="password" autocomplete="off">
</div>

<button class="btn-login" onclick="handleLogin()">
ENTRAR
</button>

</div>

</div>

</div>



<!-- SISTEMA PRINCIPAL -->

<div id="main-section" style="display:none">

<div class="container">


<!-- BARRA USUARIO -->

<div class="user-bar">

<div id="user-display"></div>

<button class="btn-exit" onclick="location.reload()">
SALIR
</button>

</div>



<!-- TABS -->

<div class="tabs-container">

<button class="tab-btn active" onclick="showTab('Grupos')">
🏆 GRUPOS
</button>

<button class="tab-btn" onclick="showTab('Ranking')">
🥇 RANKING
</button>

</div>



<!-- GRUPOS -->

<div id="wall-chart-section">

<div class="wall-header">

<div class="fifa-title">
FIFA WORLD CUP
</div>

<div class="united-title">
UNITED 2026
</div>

</div>

<div id="groups-wall-container" class="groups-wall-grid"></div>

</div>



<!-- RANKING -->

<div id="ranking-list" style="display:none">
    <div id="top3-podium" class="podium"></div>

<table class="ranking-table">

<thead>

<tr>
<th>POS</th>
<th>🥇</th>
<th>JUGADOR</th>
<th>PUNTOS</th>
<th>% ACIERTO</th>
</tr>

</thead>

<tbody id="ranking-body">

<tr>
<td colspan="5">Cargando ranking...</td>
</tr>

</tbody>

</table>

</div>



<button id="save-btn" onclick="savePredictions()">
💾 GUARDAR PRONÓSTICOS
</button>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
