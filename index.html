<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiniela Mundial 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<header>
<h1>MUNDIAL 2026</h1>
<p class="subtitle">Sistema de Pronósticos</p>
</header>

<!-- LOGIN -->

<div id="login-section">

<div class="login-page-wrapper">

<div class="login-card">

<h2>ACCESO</h2>

<div class="input-group">
<label>Usuario</label>
<input id="login-name" type="text">
</div>

<div class="input-group">
<label>PIN</label>
<input id="login-pin" type="password">
</div>

<button onclick="handleLogin()" class="btn-login">
ENTRAR
</button>

</div>

</div>

</div>


<!-- SISTEMA PRINCIPAL -->

<div id="main-section" style="display:none">

<div class="container">

<div class="user-bar">
<div id="user-display"></div>

<button class="btn-exit" onclick="location.reload()">
SALIR
</button>
</div>


<div class="tabs-container">

<button onclick="showTab('Grupos')">
🏆 GRUPOS
</button>

<button onclick="showTab('Ranking')">
🥇 RANKING
</button>

</div>


<!-- GRUPOS -->

<div id="wall-chart-section">

<div id="groups-wall-container"></div>

</div>


<!-- RANKING -->

<div id="ranking-list" style="display:none">

<div id="top3-podium"></div>

<table>

<thead>
<tr>
<th>POS</th>
<th></th>
<th>JUGADOR</th>
<th>PUNTOS</th>
<th>%</th>
</tr>
</thead>

<tbody id="ranking-body">

<tr>
<td colspan="5">Cargando ranking...</td>
</tr>

</tbody>

</table>

</div>


<button id="save-btn" onclick="savePredictions()">
💾 GUARDAR PRONÓSTICOS
</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
