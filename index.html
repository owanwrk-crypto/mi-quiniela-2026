<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela Mundialista 2026 🎯</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>MUNDIAL 2026</h1>
        <p class="subtitle">SISTEMA OFICIAL DE PRONÓSTICOS</p>
    </header>

    <div id="login-section">
        <div class="login-page-wrapper">
            <div class="login-card">
                <h2>ACCESO JUGADOR</h2>
                <div class="input-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="login-name" placeholder="Ej: Juan Perez">
                </div>
                <div class="input-group">
                    <label>PIN de Seguridad</label>
                    <input type="password" id="login-pin" placeholder="****" maxlength="4">
                </div>
                <button class="btn-login" id="login-btn" onclick="handleLogin()">ENTRAR A JUGAR</button>
            </div>
            <div class="sidebar-preview">
                <h3>PRÓXIMOS PARTIDOS</h3>
                <div id="preview-list"></div>
            </div>
        </div>
    </div>

    <div id="main-section" style="display: none;">
        <div class="container">
            <div class="user-bar">
                <div id="user-display">JUGADOR: ---</div>
                <button class="btn-exit" onclick="location.reload()">SALIR</button>
            </div>

            <div class="tabs-container">
                <button class="tab-btn active" onclick="showTab('Grupos')">GRUPOS</button>
                <button class="tab-btn" onclick="showTab('Bracket')">📊 BRACKET</button>
                <button class="tab-btn tab-ranking" onclick="showTab('Ranking')">🏆 RANKING</button>
            </div>

            <div id="match-list"></div>

            <div id="bracket-view" style="display: none;">
                <div class="groups-grid" id="groups-summary"></div>
                
                <div class="tournament-bracket">
                    <div class="bracket-column">
                        <h4 class="bracket-title">OCTAVOS IZQ</h4>
                        <div class="match-slot" id="oct-1"></div>
                        <div class="match-slot" id="oct-2"></div>
                    </div>
                    <div class="bracket-column">
                        <h4 class="bracket-title">FINAL</h4>
                        <div class="match-slot final-slot" id="final-match"></div>
                    </div>
                    <div class="bracket-column">
                        <h4 class="bracket-title">OCTAVOS DER</h4>
                        <div class="match-slot" id="oct-3"></div>
                        <div class="match-slot" id="oct-4"></div>
                    </div>
                </div>
            </div>

            <div id="ranking-list" style="display: none;">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>JUGADOR</th>
                            <th>PTS</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body"></tbody>
                </table>
            </div>

            <button id="save-btn" onclick="savePredictions()">
                💾 GUARDAR MIS PRONÓSTICOS
            </button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
